<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Color Palette</title>

    <!-- Linking Font Awesom Kit -->
    <script src="https://kit.fontawesome.com/99ec8ca60f.js" crossorigin="anonymous"></script>

    <!-- Linking CSS Files -->

    <!-- This CSS File Includes The Main CSS Of The Body etc ... -->
    <link rel="stylesheet" href="CSS/style.css">

    <!-- This CSS File Includes ALL The CSS Of The Color Palette Container -->
    <link rel="stylesheet" href="CSS/colorPalette.css">

    <!-- Linking JavaScript Files -->

    <!-- This js file is the main file where final execution happens {function calling etc} -->
    <script defer type="module" src="JS/script.js"></script>

    <!-- This js file holds all the DOM element access -->
    <script defer type="module" src="JS/script.js"></script>

    <!-- This js file holds all the function used -->
    <script defer type="module" src="JS/script.js"></script>

</head>

<body>

    <div id="colorPaletteContainer">

        <h1 id="title">Color Palette Generator</h1>

        <div id="colorPaletteColorsContainersContainer">

            <div id="item1" class="items">
                <div id="colorHolder1" class="colorHolder" style="background-color: #0F172A;"></div>
                <div id="colorCodeHolder1" class="colorCodeHolder">#0F172A</div>
            </div>

            <div id="item2" class="items">
                <div id="colorHolder2" class="colorHolder" style="background-color: #1E293B;"></div>
                <div id="colorCodeHolder2" class="colorCodeHolder">#1E293B</div>
            </div>

            <div id="item3" class="items">
                <div id="colorHolder3" class="colorHolder" style="background-color: #334155;"></div>
                <div id="colorCodeHolder3" class="colorCodeHolder">#334155</div>
            </div>

            <div id="item4" class="items">
                <div id="colorHolder4" class="colorHolder" style="background-color: #64748B;"></div>
                <div id="colorCodeHolder4" class="colorCodeHolder">#64748B</div>
            </div>

            <div id="item5" class="items">
                <div id="colorHolder5" class="colorHolder" style="background-color: #F8FAFC;"></div>
                <div id="colorCodeHolder5" class="colorCodeHolder">#F8FAFC</div>
            </div>

        </div>

            <button id="generatePaletteBtn">
                <i id="refreshIcon1" class="fa-solid fa-arrows-rotate" style="color: rgb(255, 255, 255);"></i>
                <span id="generatePaletteBtnText">Generate Palette</span>
            </button>

    </div>
    
</body>

</html>
